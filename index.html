<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Recovery Plan</title>
    
    <style>
        /* PREMIUM DARK THEME CSS */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 420px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .step { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease-out; }
        
        h2 { 
            margin-bottom: 25px; 
            font-size: 24px; 
            font-weight: 600;
            line-height: 1.4;
        }
        .highlight { color: #4cc9f0; }

        .option-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .option-btn:hover, .option-btn:active {
            background-color: #4cc9f0;
            color: #000;
            border-color: #4cc9f0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 201, 240, 0.4);
        }

        .cta-btn {
            background: linear-gradient(135deg, #f11712, #b21f1f);
            color: white;
            font-size: 18px;
            font-weight: 700;
            padding: 18px;
            border: none;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 8px 20px rgba(241, 23, 18, 0.4);
            animation: pulse 2s infinite;
            transition: all 0.3s ease;
        }
        .cta-btn:hover {
            transform: scale(1.05);
        }

        #loading-section { margin-top: 30px; }
        #loading-text { font-size: 20px; color: #4cc9f0; }
        .progress-bar {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            height: 12px;
            margin-top: 25px;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: #4cc9f0;
            transition: width 0.1s;
            box-shadow: 0 0 10px #4cc9f0;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(241, 23, 18, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(241, 23, 18, 0); }
            100% { box-shadow: 0 0 0 0 rgba(241, 23, 18, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="step-1" class="step active">
        <h2>Select your <span class="highlight">Age Range</span> to customize your plan.</h2>
        <button class="option-btn" onclick="nextStep(2)">18 - 24</button>
        <button class="option-btn" onclick="nextStep(2)">25 - 34</button>
        <button class="option-btn" onclick="nextStep(2)">35 - 44</button>
        <button class="option-btn" onclick="nextStep(2)">45+</button>
    </div>

    <div id="step-2" class="step">
        <h2>What is your <span class="highlight">biggest struggle</span> right now?</h2>
        <button class="option-btn" onclick="startLoading()">Lower back & joint pain</button>
        <button class="option-btn" onclick="startLoading()">Trouble falling asleep</button>
        <button class="option-btn" onclick="startLoading()">Neck/posture stiffness</button>
        <button class="option-btn" onclick="startLoading()">Constant exhaustion</button>
    </div>

    <div id="step-3" class="step">
        <div id="loading-section">
            <h2 id="loading-text">Analyzing profile...</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="fill"></div>
            </div>
        </div>
        
        <div id="final-cta" style="display: none;">
            <h2>✅ Blueprint <span class="highlight">Generated!</span></h2>
            <p style="color: #ccc; margin-bottom: 25px; line-height: 1.5;">Your personalized recovery guide and checklist is ready to view.</p>
            
            <button class="cta-btn" onclick="window.location.href='https://lockerpreview.com/cl/v/344npm'">UNLOCK MY BLUEPRINT</button>
        </div>
    </div>

</div>

<script>
    function nextStep(stepNumber) {
        document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
        document.getElementById('step-' + stepNumber).classList.add('active');
    }

    function startLoading() {
        nextStep(3);
        let width = 0;
        let fill = document.getElementById('fill');
        let text = document.getElementById('loading-text');
        
        let interval = setInterval(() => {
            width += 2;
            fill.style.width = width + '%';
            
            if (width === 40) text.innerText = "Locating recovery protocol...";
            if (width === 75) text.innerText = "Finalizing blueprint...";
            if (width >= 100) {
                clearInterval(interval);
                document.getElementById('loading-section').style.display = 'none';
                document.getElementById('final-cta').style.display = 'block';
            }
        }, 60); 
    }
</script>

</body>
</html>
